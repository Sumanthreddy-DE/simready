name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  spec-fast:
    # Pure-python subset: proves the DSL schema layer with zero native deps.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pydantic pytest
      - run: pytest tests/test_gen_spec.py -q

  full-suite:
    # Full sr-equivalent env via micromamba (proven on linux-64: first run
    # resolved and passed 190/192 in 14.6 s; the 2 failures were tests that
    # asserted on gitignored local data and now skip when it's absent).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
      - name: Install pip deps
        shell: bash -el {0}
        # torch_geometric is not in requirements.txt because its Windows pip
        # install needs manual wheel picking; on linux the plain install works.
        run: pip install -r requirements.txt torch_geometric
      - name: Run suite (no live-LLM tests)
        shell: bash -el {0}
        run: pytest -m "not live_llm" -q
