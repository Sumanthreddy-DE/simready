[pytest]
pythonpath = .
# Default-deselect live tests: repo modules (ui/copilot_app.py, copilot/cli.py)
# call load_dotenv() at import, so an env-var guard alone cannot keep a plain
# `pytest` offline once .env carries OPENAI_BASE_URL/OPENAI_MODEL. An explicit
# `-m live_llm` on the command line overrides this.
addopts = -m "not live_llm"
markers =
    live_llm: hits a real LLM endpoint; excluded from CI and default runs
